<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportForYou — Головна</title>
    <link rel="icon" type="image/png" href="image/AvatarBot.png">
    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" href="style/main-style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-icon">
                <img src="image/AvatarBot.png" class="bot-logo" id="main-avatar" alt="Logo">
            </div>
            <span>SportForYou</span>
        </div>

        <div class="profile">
            <div class="AvatarBot"></div>
            <div class="info">
                <span class="name">Ім'я</span>
                <span class="activity">Вид діяльності</span>
            </div>
        </div>

        <div class="GYM-image">
            <img src="image/GYM.png" class="GYM-image" alt="GYM Image">
        </div>

        <div class="quotes">
            <div id="quote-text">Завантаження мотивації...</div>
        </div>

        <div class="gallery" id="exercise-gallery">
            <div class="small-image"><img src="" alt="Exercise"></div>
            <div class="small-image"><img src="" alt="Exercise"></div>
            <div class="small-image"><img src="" alt="Exercise"></div>
            <div class="small-image"><img src="" alt="Exercise"></div>
        </div>
    </div>

    <div class="menu">
        <a href="Main.html"><button class="active">Головна</button></a>
        <a href="Create_training.html"><button>Тренування</button></a>
        <a href="stats.html"><button>Статистика</button></a>
        <a href="profile.html"><button>Профіль</button></a>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const tg = window.Telegram.WebApp;
            const user = tg.initDataUnsafe?.user;
            const mainAvatar = document.getElementById('main-avatar');
            if (mainAvatar) {
                const savedPhoto = localStorage.getItem('userCustomPhoto');
                if (savedPhoto) mainAvatar.src = savedPhoto;
                else if (user && user.photo_url) mainAvatar.src = user.photo_url;
            }
        });
    </script>
    <script src="script/Quotes-ai.js"></script>
    <script src="script/sport-exercises-main.js"></script>
    <script src="script/register-main.js"></script>
</body>
</html>
