<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Конструктор — SportForYou</title>
    <link rel="stylesheet" href="style/profile-stile.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="icon" type="image/png" href="image/AvatarBot.png">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-icon">
                <img src="image/AvatarBot.png" class="bot-logo" id="main-avatar">
            </div>
            AI Конструктор
        </div>

        <div class="menu">
            <div class="select-box">
                <label>Ціль:</label>
                <select id="ai-goal">
                    <option value="схуднення">Схуднення</option>
                    <option value="набір маси">Набір маси</option>
                    <option value="рельєф">Рельєф</option>
                </select>
            </div>

            <div class="select-box">
                <label>Складність:</label>
                <select id="ai-level">
                    <option value="легкий (для новачків)">Легкий</option>
                    <option value="середній (оптимальний)">Середній</option>
                    <option value="важкий (для професіоналів)">Важкий</option>
                </select>
            </div>

            <div class="select-box">
                <label>Місце:</label>
                <select id="ai-place">
                    <option value="вдома">Вдома</option>
                    <option value="в залі">Зал</option>
                </select>
            </div>

            <button class="menu-btn" id="gen-btn" style="background: var(--accent);" onclick="generateWithAI()">
                Згенерувати через AI ✨
            </button>
        </div>

        <div id="result-box" style="display: none; margin-top: 20px; background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--accent);">
            <div id="loading-spinner" style="display: none; text-align: center; padding: 20px;">
                🧠 AI складає план...
            </div>
            <div id="result-text" style="font-size: 14px; line-height: 1.6; white-space: pre-line;"></div>
        </div>

        <div class="spacer"></div>
    </div>

    <div class="footer">
        <a href="Main.html"><button>Головна</button></a>
        <a href="Create_training.html"><button class="active">Тренування</button></a>
        <a href="stats.html"><button>Статистика</button></a>
        <a href="profile.html"><button>Профіль</button></a>
    </div>

    <script src="script/ai-constructor.js"></script>
</body>
</html>
