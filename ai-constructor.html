<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Конструктор — SportForYou</title>
    <link rel="icon" type="image/png" href="image/AvatarBot.png">
    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" href="style/profile-stile.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="back-btn" onclick="history.back()">←</button>
            <span>AI Конструктор</span>
        </div>
        <div class="profile-menu">
            <div class="select-box">
                <label style="font-size:13px; color:var(--text-secondary); margin-bottom:6px; display:block;">Ціль</label>
                <select id="ai-goal">
                    <option value="схуднення">Схуднення</option>
                    <option value="набір маси">Набір маси</option>
                    <option value="рельєф">Рельєф</option>
                </select>
            </div>
            <div class="select-box">
                <label style="font-size:13px; color:var(--text-secondary); margin-bottom:6px; display:block;">Складність</label>
                <select id="ai-level">
                    <option value="легкий (для новачків)">Легкий</option>
                    <option value="середній (оптимальний)">Середній</option>
                    <option value="важкий (для професіоналів)">Важкий</option>
                </select>
            </div>
            <div class="select-box">
                <label style="font-size:13px; color:var(--text-secondary); margin-bottom:6px; display:block;">Місце</label>
                <select id="ai-place">
                    <option value="вдома">Вдома</option>
                    <option value="в залі">Зал</option>
                </select>
            </div>
            <button class="menu-btn" id="gen-btn" onclick="generateWithAI()"
                style="background: var(--accent); color: white; border-color: var(--accent);">
                Згенерувати через AI ✨
            </button>
        </div>

        <div id="result-box" style="display:none; margin-top:20px;" class="card">
            <div id="loading-spinner" style="display:none; text-align:center; padding:20px; color:var(--text-secondary);">
                🧠 AI складає план...
            </div>
            <div id="result-text" style="font-size:14px; line-height:1.6; white-space:pre-line;"></div>
        </div>

        <div class="spacer"></div>
    </div>

    <div class="menu">
        <a href="Main.html"><button>Головна</button></a>
        <a href="Create_training.html"><button class="active">Тренування</button></a>
        <a href="stats.html"><button>Статистика</button></a>
        <a href="profile.html"><button>Профіль</button></a>
    </div>

    <script src="script/ai-constructor.js"></script>
</body>
</html>
