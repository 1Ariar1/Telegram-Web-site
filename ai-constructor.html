<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Конструктор — SportForYou</title>
    <link rel="stylesheet" href="style/profile-stile.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-icon">
                <img src="image/AvatarBot.png" class="bot-logo" id="main-avatar" alt="Logo">
            </div>
            AI Конструктор
        </div>

        <div class="menu">
            <p style="text-align: center; color: var(--text-dim);">Налаштуйте параметри для генерації плану</p>
            
            <div class="select-box">
                <label style="font-size: 12px; margin-left: 5px;">Ціль тренування:</label>
                <select id="ai-goal">
                    <option value="схуднення">Схуднення</option>
                    <option value="набір маси">Набір м'язової маси</option>
                    <option value="витривалість">Витривалість та рельєф</option>
                </select>
            </div>

            <div class="select-box">
                <label style="font-size: 12px; margin-left: 5px;">Місце занять:</label>
                <select id="ai-place">
                    <option value="вдома">Вдома (без інвентарю)</option>
                    <option value="в залі">Тренажерний зал</option>
                    <option value="на вулиці">Вуличний майданчик</option>
                </select>
            </div>

            <button class="menu-btn" style="background: var(--accent); margin-top: 10px;" onclick="startGeneration()">
                Згенерувати тренування ✨
            </button>
        </div>

        <div id="result-box" style="display: none; margin-top: 20px; background: var(--card); padding: 15px; border-radius: var(--radius); border: 1px solid var(--accent);">
            <h3 id="result-title" style="margin-top: 0; color: var(--accent);">Ваш план готовий:</h3>
            <div id="result-text" style="font-size: 14px; line-height: 1.6; white-space: pre-line;"></div>
            <button class="menu-btn" style="margin-top: 15px; background: #28a745;" onclick="saveToHistory()">
                Додати в історію
            </button>
        </div>

        <div class="spacer"></div>
    </div>

    <div class="footer">
        <a href="Main.html"><button>Головна</button></a>
        <a href="Create_training.html"><button class="active">Тренування</button></a>
        <a href="stats.html"><button>Статистика</button></a>
        <a href="profile.html"><button>Профіль</button></a>
    </div>

    <script src="script/ai-constructor.js"></script>
</body>
</html>
