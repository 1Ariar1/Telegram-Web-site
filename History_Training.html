<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportForYou — Історія тренувань</title>
    <link rel="icon" type="image/png" href="image/AvatarBot.png">
    <link rel="stylesheet" href="style/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="back-btn" onclick="history.back()">←</button>
            <span>Історія тренувань</span>
        </div>
        <h2 style="margin-bottom:16px;">Ваші тренування</h2>

        <div id="history-list"></div>
    </div>

    <div class="menu">
        <a href="Main.html"><button>Головна</button></a>
        <a href="Create_training.html"><button class="active">Тренування</button></a>
        <a href="stats.html"><button>Статистика</button></a>
        <a href="profile.html"><button>Профіль</button></a>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const history = JSON.parse(localStorage.getItem('workoutHistory')) || [];
            const container = document.getElementById('history-list');

            if (history.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:var(--text-secondary);">Історія порожня</p>';
                return;
            }

            history.forEach((workout, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.cursor = 'pointer';
                card.onclick = () => window.location.href = `View-Workout.html?historyIndex=${index}`;

                const exercisesNames = Array.isArray(workout.exercises)
                    ? workout.exercises.map(ex => ex.name).join(', ')
                    : workout.exercises;

                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <strong>${workout.name}</strong>
                        <span style="font-size:12px; color:var(--accent);">${workout.date}</span>
                    </div>
                    <div style="font-size:13px; margin-top:5px; color:var(--text-secondary);
                                white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">
                        ${exercisesNames}
                    </div>
                `;
                container.appendChild(card);
            });
        });
    </script>
</body>
</html>
